<div class="h-screen flex overflow-hidden">
  <!-- Sidebar -->
  <aside class="nsot-sidebar">
    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">
        <i class="pi pi-sitemap"></i>
      </div>
      <div>
        <div class="sidebar-brand-text">NSoT</div>
        <div class="sidebar-brand-sub">Sielmed</div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Principal</div>
      <a routerLink="/dashboard"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{exact: true}"
         class="sidebar-link">
        <i class="pi pi-objects-column"></i>
        Dashboard
      </a>

      <div class="sidebar-section-label">Infrastructure</div>
      <a routerLink="/devices"
         routerLinkActive="active"
         class="sidebar-link">
        <i class="pi pi-server"></i>
        Devices
      </a>
      <a routerLink="/sites"
         routerLinkActive="active"
         class="sidebar-link">
        <i class="pi pi-building"></i>
        Sites
      </a>
      <a routerLink="/manufacturers"
         routerLinkActive="active"
         class="sidebar-link">
        <i class="pi pi-cog"></i>
        Manufacturers
      </a>
      <a routerLink="/device-roles"
         routerLinkActive="active"
         class="sidebar-link">
        <i class="pi pi-shield"></i>
        Device Roles
      </a>

      @if (isAdmin()) {
        <div class="sidebar-section-label">Administration</div>
        <a routerLink="/users"
           routerLinkActive="active"
           class="sidebar-link">
          <i class="pi pi-users"></i>
          Users
        </a>
      }
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      @if (getUsername()) {
        <div class="sidebar-user">
          <div class="sidebar-avatar">{{ getInitial() }}</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name">{{ getUsername() }}</div>
            <div class="sidebar-user-role">{{ isAdmin() ? 'Administrateur' : 'Lecture seule' }}</div>
          </div>
        </div>
      }
      <button
        (click)="confirmLogout()"
        class="sidebar-logout-btn"
      >
        <i class="pi pi-sign-out"></i>
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>
