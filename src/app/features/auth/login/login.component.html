<div class="login-wrapper">
  <!-- Left Side: Branding & Info -->
  <div class="login-brand animate-fade-in">
    <div class="login-brand-content">
      <div class="login-brand-logo">
        <i class="pi pi-sitemap"></i>
      </div>
      <h1 class="login-brand-title">NSoT</h1>
      <p class="login-brand-subtitle">Network Source of Truth by Sielmed</p>
      
      <div class="login-brand-features">
        <div class="login-brand-feature">
          <i class="pi pi-server"></i>
          <span>Inventaire centralisé des équipements</span>
        </div>
        <div class="login-brand-feature">
          <i class="pi pi-map"></i>
          <span>Gestion des sites et datacenters</span>
        </div>
        <div class="login-brand-feature">
          <i class="pi pi-chart-pie"></i>
          <span>Tableaux de bord et analytics en temps réel</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Side: Login Form -->
  <div class="login-form-side">
    <div class="login-form-container animate-fade-in-up">
      <div class="login-form-card">
        <h2 class="login-form-title">Bienvenue</h2>
        <p class="login-form-subtitle">Connectez-vous pour accéder à votre espace</p>

        @if (error) {
          <div class="login-error">
            <i class="pi pi-exclamation-triangle"></i>
            <span>{{ error }}</span>
          </div>
        }

        <form (ngSubmit)="onSubmit()">
          <div class="login-input-group">
            <label for="username">Nom d'utilisateur</label>
            <i class="pi pi-user input-icon"></i>
            <input id="username" [(ngModel)]="username" name="username" placeholder="Entrez votre identifiant" required autocomplete="username" />
          </div>

          <div class="login-input-group">
            <label for="password">Mot de passe</label>
            <i class="pi pi-lock input-icon"></i>
            <input id="password" [(ngModel)]="password" name="password" type="password" placeholder="••••••••" required autocomplete="current-password" />
          </div>

          <button type="submit" class="login-submit-btn mt-4">
            <span class="flex items-center justify-center gap-2">
              Se connecter
              <i class="pi pi-arrow-right text-sm"></i>
            </span>
          </button>
        </form>
        
        <div class="mt-8 text-center text-xs text-slate-400">
          &copy; {{ currentYear }} Sielmed. Tous droits réservés.
        </div>
      </div>
    </div>
  </div>
</div>
