<div class="page-container">
  <div class="form-card animate-fade-in-up">
    <div class="form-card-header">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-md bg-indigo-100 text-indigo-600 flex items-center justify-center text-xl">
          <i class="pi pi-shield"></i>
        </div>
        <div>
          <h1>{{ isEditMode ? 'Modifier le rôle' : 'Nouveau rôle' }}</h1>
          <p>{{ isEditMode ? 'Mettez à jour ce rôle d\'équipement' : 'Créez un nouveau rôle fonctionnel' }}</p>
        </div>
      </div>
    </div>

    @if (error) {
      <div class="px-7 pt-4">
        <div class="error-banner mb-0">
          <i class="pi pi-exclamation-triangle"></i>
          <span>{{ error }}</span>
        </div>
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-card-body">
        
        <div class="form-group mb-0">
          <label for="nom">Nom du rôle <span class="text-red-500">*</span></label>
          <div class="p-input-icon-left w-full">
            <i class="pi pi-tag text-slate-400"></i>
            <input pInputText id="nom" formControlName="nom" class="w-full pl-10" placeholder="Ex: Core Router, Access Switch..." />
          </div>
          @if (form.get('nom')?.invalid && form.get('nom')?.touched) {
            <div class="form-error"><i class="pi pi-exclamation-circle"></i> Le nom est obligatoire (min. 2 caractères)</div>
          }
        </div>

      </div>

      <div class="form-card-footer">
        <p-button type="button" label="Annuler" severity="secondary" [text]="true" (onClick)="onCancel()" />
        <p-button type="submit" label="Enregistrer le rôle" icon="pi pi-check" [loading]="loading" [disabled]="form.invalid" />
      </div>
    </form>
  </div>
</div>
