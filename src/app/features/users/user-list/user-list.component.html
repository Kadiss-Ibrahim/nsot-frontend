<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Users</h1>

  @if (error) {
    <p class="text-red-600 mb-4">{{ error }}</p>
  }

  <p-table [value]="users" [loading]="loading" [paginator]="true" [rows]="10" styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th>Username</th>
        <th>Rôle</th>
        <th>Créé le</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.role }}</td>
        <td>{{ user.createdAt | date:'dd/MM/yyyy' }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="3" class="text-center text-gray-500">Aucun utilisateur trouvé</td>
      </tr>
    </ng-template>
  </p-table>
</div>
