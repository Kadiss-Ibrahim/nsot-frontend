<div class="p-6">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">Users</h1>
    <p-button label="Nouveau" icon="pi pi-plus" routerLink="/users/new" />
  </div>

  @if (error) {
    <p class="text-red-600 mb-4">{{ error }}</p>
  }

  <div class="bg-white p-4 rounded shadow mb-4 flex flex-wrap gap-3 items-end">
    <div class="flex-1 min-w-[160px]">
      <label for="search-user-username" class="block text-sm font-medium mb-1">Username</label>
      <input pInputText id="search-user-username" [(ngModel)]="searchUsername" (ngModelChange)="onFilterChange()" placeholder="Rechercher par username..." class="w-full" />
    </div>
    <div class="min-w-[160px]">
      <label for="search-user-role" class="block text-sm font-medium mb-1">Rôle</label>
      <p-select
        id="search-user-role"
        [(ngModel)]="searchRole"
        (ngModelChange)="onFilterChange()"
        [options]="roleOptions"
        placeholder="Tous les rôles"
        [showClear]="true"
        class="w-full"
      />
    </div>
    @if (hasActiveFilters()) {
      <div class="flex gap-2">
        <p-button label="Réinitialiser" icon="pi pi-times" severity="secondary" [outlined]="true" (onClick)="resetSearch()" />
      </div>
    }
  </div>

  <p-table [value]="users" [loading]="loading" [paginator]="true" [rows]="10" styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th>Username</th>
        <th>Rôle</th>
        <th>Créé le</th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.role }}</td>
        <td>{{ user.createdAt | date:'dd/MM/yyyy' }}</td>
        <td>
          <div class="flex gap-1">
            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" [routerLink]="['/users', user.id, 'edit']" />
            <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [text]="true" (onClick)="confirmDelete(user)" />
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center text-gray-500">Aucun utilisateur trouvé</td>
      </tr>
    </ng-template>
  </p-table>
</div>
