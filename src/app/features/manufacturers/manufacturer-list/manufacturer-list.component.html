<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Manufacturers</h1>

  @if (error) {
    <p class="text-red-600 mb-4">{{ error }}</p>
  }

  <p-table
    [value]="manufacturers"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    styleClass="p-datatable-sm"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Nom</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-manufacturer>
      <tr>
        <td>{{ manufacturer.id }}</td>
        <td>{{ manufacturer.nom }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="2" class="text-center text-gray-500">Aucun manufacturer trouvé</td>
      </tr>
    </ng-template>
  </p-table>
</div>
