<div class="p-6">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">Sites</h1>
    @if (isAdmin()) {
      <p-button label="Nouveau" icon="pi pi-plus" routerLink="/sites/new" />
    }
  </div>

  @if (error) {
    <p class="text-red-600 mb-4">{{ error }}</p>
  }

  <div class="bg-white p-4 rounded shadow mb-4 flex flex-wrap gap-3 items-end">
    <div class="flex-1 min-w-[160px]">
      <label for="search-site-nom" class="block text-sm font-medium mb-1">Nom</label>
      <input pInputText id="search-site-nom" [(ngModel)]="searchNom" (ngModelChange)="onFilterChange()" placeholder="Nom du site..." class="w-full" />
    </div>
    <div class="flex-1 min-w-[160px]">
      <label for="search-site-ville" class="block text-sm font-medium mb-1">Ville</label>
      <input pInputText id="search-site-ville" [(ngModel)]="searchVille" (ngModelChange)="onFilterChange()" placeholder="Ville..." class="w-full" />
    </div>
    @if (hasActiveFilters()) {
      <div class="flex gap-2">
        <p-button label="Réinitialiser" icon="pi pi-times" severity="secondary" [outlined]="true" (onClick)="resetSearch()" />
      </div>
    }
  </div>

  <p-table [value]="sites" [loading]="loading" [paginator]="true" [rows]="10" styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th>Nom</th>
        <th>Ville</th>
        <th>Pays</th>
        <th>Responsable</th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-site>
      <tr>
        <td>{{ site.nom }}</td>
        <td>{{ site.ville }}</td>
        <td>{{ site.pays }}</td>
        <td>{{ site.responsable || '-' }}</td>
        <td>
          <div class="flex gap-1">
            @if (isAdmin()) {
              <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" [routerLink]="['/sites', site.id, 'edit']" />
              <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [text]="true" (onClick)="confirmDelete(site)" />
            }
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center text-gray-500">Aucun site trouvé</td>
      </tr>
    </ng-template>
  </p-table>
</div>
