<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Sites</h1>

  @if (error) {
    <p class="text-red-600 mb-4">{{ error }}</p>
  }

  <p-table [value]="sites" [loading]="loading" [paginator]="true" [rows]="10" styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th>Nom</th>
        <th>Ville</th>
        <th>Pays</th>
        <th>Responsable</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-site>
      <tr>
        <td>{{ site.nom }}</td>
        <td>{{ site.ville }}</td>
        <td>{{ site.pays }}</td>
        <td>{{ site.responsable || '-' }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center text-gray-500">Aucun site trouvé</td>
      </tr>
    </ng-template>
  </p-table>
</div>
