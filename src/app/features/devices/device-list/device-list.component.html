<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Devices</h1>

  @if (error) {
    <p class="text-red-600 mb-4">{{ error }}</p>
  }

  <p-table [value]="devices" [loading]="loading" [paginator]="true" [rows]="10" styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th>Hostname</th>
        <th>Site</th>
        <th>Rôle</th>
        <th>Manufacturer</th>
        <th>Statut</th>
        <th>IP Management</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-device>
      <tr>
        <td>{{ device.hostname }}</td>
        <td>{{ device.site?.nom || '-' }}</td>
        <td>{{ device.deviceRole?.nom || '-' }}</td>
        <td>{{ device.manufacturer?.nom || '-' }}</td>
        <td>
          <p-tag [value]="device.status" [severity]="statusSeverity(device.status)" />
        </td>
        <td>{{ device.managementIp || '-' }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center text-gray-500">Aucun device trouvé</td>
      </tr>
    </ng-template>
  </p-table>
</div>
